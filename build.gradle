plugins {
    id 'net.neoforged.moddev' version '1.0.14'
}

neoForge {
    version = project.neo_version
    parchment {
        mappingsVersion = '2024.07.28'
        minecraftVersion = '1.21'
    }
    runs {
        client { client() }
    }
    mods {
        betteritemvaults {
            sourceSet sourceSets.main
        }
    }
}

repositories {
    maven { url = "https://createmod.net" } // Create Repo
}

dependencies {
    implementation "com.simibubi.create:create-neoforge-1.21.1:0.6.0"
}
