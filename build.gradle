plugins {
    id 'net.neoforged.moddev' version '1.0.14'
}

neoForge {
    version = project.neo_version
    parchment {
        mappingsVersion = '2024.07.28'
        minecraftVersion = '1.21'
    }
    runs {
        client { client() }
    }
    mods {
        betteritemvaults {
            sourceSet sourceSets.main
        }
    }
}

repositories {
    mavenLocal()
    maven { url = "https://maven.createmod.net" } // Create, Ponder, Flywheel
    maven { url = "https://maven.ithundxr.dev/snapshots" } // Registrate
    maven { url = "https://maven.neoforged.net/releases" } // NeoForge
}

dependencies {
    // Core Create dependency
    implementation("com.simibubi.create:create-${minecraft_version}:${create_version}:slim") { transitive = false }
    
    // Required companion libraries for Create 0.6.x
    implementation("net.createmod.ponder:ponder-neoforge:${ponder_version}+mc${minecraft_version}")
    compileOnly("dev.engine-room.flywheel:flywheel-neoforge-api-${minecraft_version}:0.6.11")
}
